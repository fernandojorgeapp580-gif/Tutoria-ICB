<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Em Breve - Tutoria ICB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --cor-fundo: #eaf1f5;
            --cor-primaria: #5c7fa9;
            --cor-vinho: #9e1b32;
        }

        body { 
            background-color: var(--cor-fundo);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-family: sans-serif;
            margin: 0;
        }

        .container-aviso {
            max-width: 500px;
            padding: 30px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .icon-construcao {
            font-size: 80px;
            margin-bottom: 20px;
            display: block;
        }

        h1 {
            color: var(--cor-primaria);
            font-weight: bold;
            font-size: 1.8rem;
        }

        p {
            color: #666;
            margin-bottom: 30px;
        }

        .btn-voltar {
            background-color: var(--cor-vinho);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 30px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn-voltar:hover {
            background-color: var(--cor-primaria);
            color: white;
            transform: scale(1.05);
        }

        /* Um detalhe acadêmico para o rodapé */
        .badge-ufpa {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container-aviso mx-3">
        <span class="icon-construcao">🏗️</span>
        <h1>Conteúdo em Preparo</h1>
        <p>Olá! Nossa equipe de tutoria está organizando os melhores materiais para esta área. Em breve, apostilas e vídeos estarão disponíveis aqui.</p>
        
        <a href="index.html" class="btn-voltar">← Voltar para o Início</a>
        
        <div class="badge-ufpa">
            Programa de Tutoria ICB - UFPA
        </div>
    </div>

</body>
</html>
